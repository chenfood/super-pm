<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Super PM - Interaction Design</title>
  <style>
    /*
     * SUPER PM VISUAL COMPANION FRAME TEMPLATE
     *
     * This template provides a consistent frame with:
     * - OS-aware light/dark theming
     * - Fixed header and selection indicator bar
     * - Scrollable main content area
     * - CSS helpers for common UI patterns
     *
     * Content is injected via placeholder comment in #claude-content.
     */

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    /* ===== THEME: OBSIDIAN ===== */
    :root, [data-theme="dark"] {
      --bg-primary: #09090b;
      --bg-secondary: #18181b;
      --bg-tertiary: #27272a;
      --bg-glass: rgba(9, 9, 11, 0.8);
      --bg-elevated: rgba(39, 39, 42, 0.5);
      --border: rgba(255, 255, 255, 0.06);
      --border-accent: rgba(139, 92, 246, 0.3);
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-tertiary: #52525b;
      --accent: #a78bfa;
      --accent-hover: #c4b5fd;
      --accent-glow: rgba(167, 139, 250, 0.15);
      --accent-solid: #7c3aed;
      --brand-from: #a78bfa;
      --brand-to: #f472b6;
      --gold: #fbbf24;
      --gold-glow: rgba(251, 191, 36, 0.12);
      --success: #34d399;
      --success-bg: rgba(52, 211, 153, 0.1);
      --warning: #fbbf24;
      --error: #f87171;
      --error-bg: rgba(248, 113, 113, 0.1);
      --selected-bg: rgba(167, 139, 250, 0.08);
      --selected-border: #a78bfa;
      --gradient-subtle: linear-gradient(135deg, rgba(167, 139, 250, 0.06), rgba(244, 114, 182, 0.03));
      --gradient-brand: linear-gradient(135deg, #a78bfa, #f472b6);
      --shadow-glow: 0 0 40px rgba(167, 139, 250, 0.08);
      --shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.03);
      --shadow-card-hover: 0 8px 30px rgba(0,0,0,0.5), 0 0 0 1px rgba(167,139,250,0.1);
      --device-bezel: #18181b;
      --device-bezel-aos: #1e1e22;
      --radius: 12px;
    }

    /* ===== THEME: PEARL ===== */
    [data-theme="light"] {
      --bg-primary: #fafaf9;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f5f5f4;
      --bg-glass: rgba(255, 255, 255, 0.8);
      --bg-elevated: rgba(255, 255, 255, 0.9);
      --border: rgba(0, 0, 0, 0.06);
      --border-accent: rgba(124, 58, 237, 0.2);
      --text-primary: #1c1917;
      --text-secondary: #57534e;
      --text-tertiary: #a8a29e;
      --accent: #7c3aed;
      --accent-hover: #6d28d9;
      --accent-glow: rgba(124, 58, 237, 0.08);
      --accent-solid: #7c3aed;
      --brand-from: #7c3aed;
      --brand-to: #db2777;
      --gold: #d97706;
      --gold-glow: rgba(217, 119, 6, 0.08);
      --success: #059669;
      --success-bg: rgba(5, 150, 105, 0.06);
      --warning: #d97706;
      --error: #dc2626;
      --error-bg: rgba(220, 38, 38, 0.06);
      --selected-bg: rgba(124, 58, 237, 0.05);
      --selected-border: #7c3aed;
      --gradient-subtle: linear-gradient(135deg, rgba(124, 58, 237, 0.03), rgba(219, 39, 119, 0.02));
      --gradient-brand: linear-gradient(135deg, #7c3aed, #db2777);
      --shadow-glow: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.03);
      --shadow-card-hover: 0 8px 25px rgba(0,0,0,0.08), 0 0 0 1px rgba(124,58,237,0.08);
      --device-bezel: #1c1917;
      --device-bezel-aos: #292524;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      line-height: 1.5;
      transition: background 0.35s ease, color 0.35s ease;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    [data-theme="dark"] body, :root:not([data-theme="light"]) body {
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(167, 139, 250, 0.06), transparent),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(244, 114, 182, 0.04), transparent);
    }
    [data-theme="light"] body {
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(124, 58, 237, 0.03), transparent),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(219, 39, 119, 0.02), transparent);
    }

    /* ===== FRAME STRUCTURE ===== */
    .header {
      background: var(--bg-glass);
      backdrop-filter: blur(20px) saturate(1.8); -webkit-backdrop-filter: blur(20px) saturate(1.8);
      padding: 0 1.5rem;
      height: 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);
      letter-spacing: -0.01em; display: flex; align-items: center; gap: 0.5rem;
    }
    .header h1 .brand {
      background: var(--gradient-brand); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; font-weight: 800; letter-spacing: -0.02em;
    }
    .header .status {
      font-size: 0.65rem; color: var(--success); display: flex; align-items: center; gap: 0.4rem;
      text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;
    }
    .header .status::before {
      content: ''; width: 6px; height: 6px; background: var(--success); border-radius: 50%;
      box-shadow: 0 0 8px var(--success);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .main { flex: 1; overflow-y: auto; }
    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-track { background: transparent; }
    .main::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 3px; }
    .main::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    #claude-content { padding: 2rem; min-height: 100%; }

    .indicator-bar {
      background: var(--bg-glass);
      backdrop-filter: blur(20px) saturate(1.8); -webkit-backdrop-filter: blur(20px) saturate(1.8);
      border-top: 1px solid var(--border);
      padding: 0.5rem 1.5rem;
      flex-shrink: 0;
      text-align: center;
    }
    .indicator-bar span { font-size: 0.7rem; color: var(--text-secondary); letter-spacing: 0.02em; }
    .indicator-bar .selected-text {
      background: var(--gradient-brand); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; font-weight: 600;
    }

    /* ===== TYPOGRAPHY ===== */
    h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.025em; }
    h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem; letter-spacing: -0.015em; }
    .subtitle { color: var(--text-secondary); margin-bottom: 1.5rem; font-weight: 400; }
    .section { margin-bottom: 2rem; }
    .label {
      font-size: 0.6rem; color: var(--text-tertiary); text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 0.5rem; font-weight: 600;
    }

    /* ===== OPTIONS (for A/B/C choices) ===== */
    .options { display: flex; flex-direction: column; gap: 0.75rem; }
    .option {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .option::before {
      content: ''; position: absolute; inset: 0; opacity: 0;
      background: var(--gradient-subtle);
      transition: opacity 0.2s;
    }
    .option:hover {
      border-color: var(--border-accent); transform: translateY(-2px);
      box-shadow: var(--shadow-card-hover);
    }
    .option:hover::before { opacity: 1; }
    .option.selected {
      background: var(--selected-bg); border-color: var(--selected-border);
      box-shadow: var(--shadow-card-hover);
    }
    .option .letter {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      width: 2rem; height: 2rem;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem; flex-shrink: 0;
      position: relative; z-index: 1;
      transition: all 0.2s;
    }
    .option:hover .letter { color: var(--accent); }
    .option.selected .letter {
      background: var(--gradient-brand); color: #fff;
      box-shadow: 0 2px 10px var(--accent-glow);
    }
    .option .content { flex: 1; position: relative; z-index: 1; }
    .option .content h3 { font-size: 0.95rem; margin-bottom: 0.2rem; font-weight: 600; letter-spacing: -0.01em; }
    .option .content p { color: var(--text-secondary); font-size: 0.85rem; margin: 0; line-height: 1.5; }

    /* ===== CARDS (for showing designs/mockups) ===== */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-card);
    }
    .card:hover {
      border-color: var(--border-accent); transform: translateY(-4px);
      box-shadow: var(--shadow-card-hover);
    }
    .card.selected { border-color: var(--selected-border); box-shadow: 0 0 0 1px var(--selected-border), var(--shadow-card-hover); }
    .card-image { background: var(--bg-tertiary); aspect-ratio: 16/10; display: flex; align-items: center; justify-content: center; }
    .card-body { padding: 1rem; }
    .card-body h3 { margin-bottom: 0.25rem; font-weight: 600; letter-spacing: -0.01em; }
    .card-body p { color: var(--text-secondary); font-size: 0.85rem; line-height: 1.5; }

    /* ===== MOCKUP CONTAINER ===== */
    .mockup {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-card);
    }
    .mockup-header {
      background: var(--bg-tertiary);
      padding: 0.5rem 1rem;
      font-size: 0.65rem;
      color: var(--text-tertiary);
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .mockup-body { padding: 1.5rem; }

    /* ===== SPLIT VIEW ===== */
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 700px) { .split { grid-template-columns: 1fr; } }

    /* ===== PROS/CONS ===== */
    .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0; }
    .pros, .cons {
      background: var(--bg-secondary); border-radius: var(--radius); padding: 1rem;
      border: 1px solid var(--border); box-shadow: var(--shadow-card);
    }
    .pros { border-left: 3px solid var(--success); }
    .cons { border-left: 3px solid var(--error); }
    .pros h4 { color: var(--success); font-size: 0.75rem; margin-bottom: 0.5rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .cons h4 { color: var(--error); font-size: 0.75rem; margin-bottom: 0.5rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .pros ul, .cons ul { margin-left: 1.25rem; font-size: 0.85rem; color: var(--text-secondary); }
    .pros li, .cons li { margin-bottom: 0.25rem; }

    /* ===== PLACEHOLDER ===== */
    .placeholder {
      background: var(--bg-tertiary);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      color: var(--text-tertiary);
    }

    /* ===== INLINE MOCKUP ELEMENTS ===== */
    .mock-nav { background: var(--bg-tertiary); color: var(--text-primary); padding: 0.75rem 1rem; display: flex; gap: 1.5rem; font-size: 0.9rem; border-bottom: 1px solid var(--border); }
    .mock-sidebar { background: var(--bg-tertiary); padding: 1rem; min-width: 180px; }
    .mock-content { padding: 1.5rem; flex: 1; }
    .mock-button {
      background: var(--gradient-brand); color: #fff; border: none;
      padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .mock-button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-glow); filter: brightness(1.1); }
    .mock-input {
      background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.5rem 0.75rem; width: 100%; color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .mock-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    /* ===== DEVICE FRAME (auto-activated by data-device-frame) ===== */

    /* Device frame mode: left sidebar + right phone shell */
    .device-frame-layout {
      display: flex; height: 100%; gap: 0;
    }
    .device-sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 24px 16px;
      display: flex; flex-direction: column; gap: 20px; overflow-y: auto;
      position: relative;
    }
    .device-sidebar::-webkit-scrollbar { width: 4px; }
    .device-sidebar::-webkit-scrollbar-track { background: transparent; }
    .device-sidebar::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 2px; }
    .device-sidebar h2 {
      font-size: 15px; font-weight: 800; margin-bottom: 0;
      letter-spacing: -0.03em;
      background: var(--gradient-brand); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .device-sidebar .sidebar-section { display: flex; flex-direction: column; gap: 6px; }
    .device-sidebar .sidebar-label {
      font-size: 10px; color: var(--text-tertiary); text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 2px; font-weight: 600;
    }
    .device-switcher { display: flex; flex-direction: column; gap: 4px; }
    .device-switcher button {
      padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text-secondary);
      cursor: pointer; font-size: 12px; transition: all 0.15s ease;
      text-align: left; display: flex; align-items: center; gap: 8px;
    }
    .device-switcher button:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .device-switcher button.active {
      background: var(--selected-bg); color: var(--accent);
      border-color: var(--border-accent);
    }
    .device-switcher .device-icon { font-size: 16px; }
    .device-switcher .device-label { display: flex; flex-direction: column; }
    .device-switcher .device-label small { font-size: 10px; opacity: 0.5; }
    .device-sidebar .sidebar-hint {
      font-size: 11px; color: var(--text-tertiary); line-height: 1.6;
      padding: 10px 12px; background: var(--bg-primary); border-radius: 8px;
      border: 1px solid var(--border);
    }
    .device-main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      overflow: auto; padding: 24px;
      background:
        radial-gradient(ellipse 50% 40% at 50% 50%, var(--accent-glow), transparent);
    }
    .device-shell {
      position: relative; flex-shrink: 0;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
      transition: box-shadow 0.3s;
    }
    .device-shell:hover { box-shadow: 0 30px 70px rgba(0,0,0,0.5), 0 0 60px var(--accent-glow); }
    .device-shell-ios {
      border: 8px solid var(--device-bezel); border-radius: 47px; overflow: hidden; background: var(--device-bezel);
    }
    .device-shell-aos {
      border: 8px solid var(--device-bezel-aos); border-radius: 36px; overflow: hidden; background: var(--device-bezel-aos);
    }
    .device-statusbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; font-size: 12px; font-weight: 600; background: #fff; color: #1a1a1a;
    }
    .device-statusbar-iphone { height: 54px; align-items: flex-end; padding-bottom: 4px; }
    .device-statusbar-iphone-se { height: 44px; }
    .device-statusbar-android { height: 40px; font-weight: 400; }
    .device-dynamic-island {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 34px; background: #1a1a1a; border-radius: 20px; z-index: 10;
    }
    .device-content { overflow-y: auto; background: #fff; }
    .device-homebar {
      height: 34px; background: #fff; display: flex; align-items: center; justify-content: center;
    }
    .device-homebar-pill { width: 134px; height: 5px; background: #1a1a1a; border-radius: 3px; }
    .device-navbar-android {
      height: 40px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; gap: 48px;
    }
    .device-navbar-android .nav-square { width: 16px; height: 16px; border: 2px solid #666; border-radius: 2px; }
    .device-navbar-android .nav-circle { width: 16px; height: 16px; border: 2px solid #666; border-radius: 50%; }
    .device-navbar-android .nav-triangle {
      width: 0; height: 0; border-left: 9px solid transparent; border-right: 9px solid transparent; border-bottom: 14px solid #666;
    }

    /* ===== DEVICE CANVAS (multi-prototype iframe grid) ===== */
    .canvas-grid {
      flex: 1; display: flex; flex-wrap: wrap; align-items: flex-start;
      justify-content: center; gap: 32px; padding: 20px; overflow: auto;
    }
    .canvas-grid.layout-1 { justify-content: center; }
    .canvas-grid.layout-2 .canvas-item { max-width: calc(50% - 16px); }
    .canvas-grid.layout-3 .canvas-item { max-width: calc(33.3% - 22px); }
    .canvas-item {
      display: flex; flex-direction: column; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .canvas-item-title {
      font-size: 13px; font-weight: 600; color: var(--text-primary);
      padding: 6px 16px; background: var(--bg-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: 8px; border: 1px solid var(--border); text-align: center;
      transition: all 0.2s ease; letter-spacing: -0.01em;
    }
    .canvas-item-title:hover { border-color: var(--border-accent); background: var(--bg-elevated); }
    .canvas-item-title.selected {
      background: var(--selected-bg);
      color: var(--accent); border-color: var(--selected-border);
    }
    .canvas-item iframe {
      border: none; display: block; width: 100%; height: 100%;
    }
    /* Layout switcher in sidebar */
    .layout-switcher { display: flex; gap: 4px; }
    .layout-switcher button {
      flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg-tertiary); color: var(--text-secondary);
      cursor: pointer; font-size: 12px; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); text-align: center;
    }
    .layout-switcher button:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .layout-switcher button.active {
      background: var(--selected-bg); color: var(--accent); border-color: var(--border-accent);
    }
    /* Scheme list in sidebar */
    .scheme-list { display: flex; flex-direction: column; gap: 4px; }
    .scheme-list-item {
      padding: 8px 12px; border-radius: 8px; font-size: 13px;
      color: var(--text-secondary); cursor: default; display: flex; align-items: center; gap: 8px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .scheme-list-item .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    /* Clickable scheme items in canvas mode */
    .scheme-list-item.clickable { cursor: pointer; transition: all 0.15s; }
    .scheme-list-item.clickable:hover { background: var(--bg-tertiary); }
    .scheme-list-item.clickable.active { background: var(--selected-bg); color: var(--accent); font-weight: 600; border-left: 2px solid var(--accent); }

    /* ===== RIGHT SIDEBAR (interaction spec) ===== */
    .spec-sidebar {
      width: 420px; flex-shrink: 0; background: var(--bg-glass);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid var(--border); overflow-y: auto;
      display: flex; flex-direction: column; position: relative;
      min-width: 280px; max-width: 700px;
    }
    .spec-resize-handle {
      position: absolute; top: 0; left: -4px; width: 8px; height: 100%;
      cursor: col-resize; z-index: 10;
    }
    .spec-resize-handle::after {
      content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 2px; height: 32px; border-radius: 2px;
      background: var(--text-tertiary); opacity: 0; transition: opacity 0.2s;
    }
    .spec-resize-handle:hover::after, .spec-resize-handle.dragging::after {
      opacity: 0.6;
    }
    .spec-sidebar-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      font-size: 13px; font-weight: 600; color: var(--text-primary);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
      background: var(--bg-glass);
    }
    .spec-sidebar-header .close-btn {
      width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--bg-tertiary); color: var(--text-secondary);
      cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .spec-sidebar-header .close-btn:hover { background: rgba(252, 129, 129, 0.1); border-color: rgba(252, 129, 129, 0.3); color: var(--error); }
    .spec-sidebar-body {
      padding: 16px; flex: 1; font-size: 13px; line-height: 1.6; color: var(--text-primary);
      display: flex; flex-direction: column; gap: 12px;
    }
    /* Spec cards — each section is a card */
    .spec-card {
      background: var(--bg-primary); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
      transition: border-color 0.2s;
    }
    .spec-card:hover { border-color: var(--border-accent); }
    .spec-card-header {
      padding: 10px 14px; font-size: 12px; font-weight: 600; color: var(--accent);
      background: var(--bg-secondary); border-bottom: 1px solid var(--border);
      cursor: pointer; display: flex; align-items: center; justify-content: space-between;
      user-select: none; transition: background 0.2s;
    }
    .spec-card-header:hover { background: var(--bg-tertiary); }
    .spec-card-header .toggle-icon {
      width: 20px; height: 20px; border-radius: 6px;
      background: var(--bg-tertiary); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--text-secondary); font-weight: 300;
      transition: all 0.2s; flex-shrink: 0; line-height: 1;
    }
    .spec-card-header:hover .toggle-icon { border-color: var(--border-accent); color: var(--accent); }
    .spec-card .toggle-icon::after { content: '\2212'; }
    .spec-card.collapsed .toggle-icon::after { content: '+'; }
    .spec-card.collapsed .spec-card-body { display: none; }
    .spec-card-body { padding: 12px 14px; }
    .spec-card-body p { margin: 0 0 8px 0; color: var(--text-secondary); }
    .spec-card-body table { width: 100%; border-collapse: collapse; margin: 4px 0 8px 0; font-size: 12px; }
    .spec-card-body th {
      text-align: left; padding: 5px 8px; background: var(--bg-secondary);
      border: 1px solid var(--border); font-weight: 600; color: var(--text-secondary); font-size: 11px;
    }
    .spec-card-body td { padding: 5px 8px; border: 1px solid var(--border); font-size: 12px; }
    .spec-card-body ul, .spec-card-body ol { margin: 4px 0 8px 18px; color: var(--text-secondary); }
    .spec-card-body li { margin-bottom: 3px; }
    .spec-sidebar-empty {
      padding: 40px 20px; text-align: center; color: var(--text-tertiary); font-size: 13px;
    }
    /* Toggle button for spec sidebar (in left sidebar) */
    .spec-toggle {
      padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text-secondary);
      cursor: pointer; font-size: 12px; transition: all 0.15s ease; text-align: left; width: 100%;
    }
    .spec-toggle:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .spec-toggle.active {
      background: var(--selected-bg); color: var(--accent); border-color: var(--border-accent);
    }

    /* ===== THEME TOGGLE ===== */
    .theme-toggle {
      padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text-secondary);
      cursor: pointer; font-size: 12px; transition: all 0.15s ease;
      text-align: left; width: 100%; display: flex; align-items: center; gap: 8px;
    }
    .theme-toggle:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .theme-toggle .theme-icon { font-size: 14px; flex-shrink: 0; }
    .theme-toggle .theme-label { flex: 1; }

    /* ===== CONNECTOR LINES (spec cards → phone shell) ===== */
    .connector-svg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 50;
    }
    .connector-line {
      fill: none; stroke: var(--accent); stroke-width: 1.5;
      opacity: 0.35; transition: opacity 0.3s;
    }
    .connector-dot {
      fill: var(--accent); opacity: 0.5; transition: opacity 0.3s;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span class="brand">Super PM</span> - Interaction Design</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <button class="theme-toggle" id="header-lang-btn" style="padding:4px 10px;width:auto;font-size:0.7rem;border-radius:6px">
        <span id="header-lang-icon" style="font-size:0.7rem">EN</span>
      </button>
      <button class="theme-toggle" id="header-theme-btn" style="padding:4px 10px;width:auto;font-size:0.7rem;border-radius:6px">
        <span class="theme-icon" id="header-theme-icon"></span>
        <span class="theme-label" id="header-theme-label"></span>
      </button>
      <div class="status"><span data-i18n="connected">Connected</span></div>
    </div>
  </div>

  <div class="main">
    <div id="claude-content">
      <!-- CONTENT -->
    </div>
  </div>

  <div class="indicator-bar">
    <span id="indicator-text" data-i18n="indicatorDefault">Click an option above, then return to the terminal</span>
  </div>

  <script>
    // Device mode detection and shared utilities
    document.addEventListener('DOMContentLoaded', function() {
      var content = document.getElementById('claude-content');

      // Shared: device configurations
      var defaultDevice = 'iphone-15';
      var devices = {
        'iphone-16-pro-max': {
          group: 'ios', name: 'iPhone 16 Pro Max', size: '430\u00D7868',
          w: 430, h: 868,
          statusClass: 'device-statusbar device-statusbar-iphone',
          statusHtml: '<span>9:41</span><span style="font-size:11px">\u25CF\u25CF\u25CF \uD83D\uDD0B</span>',
          bottomHtml: '<div class="device-homebar"><div class="device-homebar-pill"></div></div>',
          showIsland: true
        },
        'iphone-15': {
          group: 'ios', name: 'iPhone 15', size: '393\u00D7788',
          w: 393, h: 788,
          statusClass: 'device-statusbar device-statusbar-iphone',
          statusHtml: '<span>9:41</span><span style="font-size:11px">\u25CF\u25CF\u25CF \uD83D\uDD0B</span>',
          bottomHtml: '<div class="device-homebar"><div class="device-homebar-pill"></div></div>',
          showIsland: true
        },
        'iphone-se': {
          group: 'ios', name: 'iPhone SE', size: '375\u00D7603',
          w: 375, h: 603,
          statusClass: 'device-statusbar device-statusbar-iphone-se',
          statusHtml: '<span>9:41</span><span style="font-size:11px">\u25CF\u25CF\u25CF \uD83D\uDD0B</span>',
          bottomHtml: '',
          showIsland: false
        },
        'pixel-9-pro': {
          group: 'aos', name: 'Pixel 9 Pro', size: '412\u00D7835',
          w: 412, h: 835,
          statusClass: 'device-statusbar device-statusbar-android',
          statusHtml: '<span>12:00</span><span style="font-size:11px">\u25B2 \uD83D\uDCF6 \uD83D\uDD0B88%</span>',
          bottomHtml: '<div class="device-navbar-android"><div class="nav-triangle"></div><div class="nav-circle"></div><div class="nav-square"></div></div>',
          showIsland: false
        },
        'galaxy-s24': {
          group: 'aos', name: 'Galaxy S24', size: '360\u00D7700',
          w: 360, h: 700,
          statusClass: 'device-statusbar device-statusbar-android',
          statusHtml: '<span>12:00</span><span style="font-size:11px">\u25B2 \uD83D\uDCF6 \uD83D\uDD0B88%</span>',
          bottomHtml: '<div class="device-navbar-android"><div class="nav-triangle"></div><div class="nav-circle"></div><div class="nav-square"></div></div>',
          showIsland: false
        },
        'galaxy-fold': {
          group: 'aos', name: 'Galaxy Fold', size: '344\u00D7802',
          w: 344, h: 802,
          statusClass: 'device-statusbar device-statusbar-android',
          statusHtml: '<span>12:00</span><span style="font-size:11px">\u25B2 \uD83D\uDCF6 \uD83D\uDD0B88%</span>',
          bottomHtml: '<div class="device-navbar-android"><div class="nav-triangle"></div><div class="nav-circle"></div><div class="nav-square"></div></div>',
          showIsland: false
        }
      };

      // Shared: enter fullscreen mode (hide header/indicator, expand main)
      function enterFullscreen() {
        var header = document.querySelector('.header');
        var indicatorBar = document.querySelector('.indicator-bar');
        var main = document.querySelector('.main');
        if (header) header.style.display = 'none';
        if (indicatorBar) indicatorBar.style.display = 'none';
        if (main) { main.style.flex = '1'; main.style.overflow = 'hidden'; }
        content.style.padding = '0';
        content.style.height = '100%';
      }

      // Theme: read from localStorage, apply to <html>, sync all toggle buttons
      var currentTheme = localStorage.getItem('superpm-theme') || 'light';
      document.documentElement.setAttribute('data-theme', currentTheme);

      var LIGHT_ICON = '\u2600\uFE0F', DARK_ICON = '\uD83C\uDF19';

      function syncThemeUI() {
        var icons = document.querySelectorAll('#theme-icon, #header-theme-icon');
        var labels = document.querySelectorAll('#theme-label, #header-theme-label');
        var iconText = currentTheme === 'light' ? LIGHT_ICON : DARK_ICON;
        var labelText = currentTheme === 'light' ? 'Light Mode' : 'Dark Mode';
        icons.forEach(function(el) { el.textContent = iconText; });
        labels.forEach(function(el) { el.textContent = labelText; });
      }

      function toggleTheme() {
        currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', currentTheme);
        localStorage.setItem('superpm-theme', currentTheme);
        syncThemeUI();
      }

      // Init header theme button immediately
      syncThemeUI();
      var headerThemeBtn = document.getElementById('header-theme-btn');
      if (headerThemeBtn) headerThemeBtn.addEventListener('click', toggleTheme);

      // ===== i18n =====
      var i18n = {
        en: {
          connected: 'Connected',
          interactionDesign: 'Interaction Design',
          device: 'Device',
          specs: 'Specs',
          showSpec: 'Show Interaction Spec',
          specTitle: 'Interaction Spec',
          specEmpty: 'Select a prototype to view its interaction spec',
          noSpec: 'No interaction spec available',
          theme: 'Theme',
          lightMode: 'Light Mode',
          darkMode: 'Dark Mode',
          language: 'Language',
          status: 'Status',
          statusHint: 'Interact with prototypes, then return to terminal',
          indicatorDefault: 'Click an option above, then return to the terminal',
          selected: 'selected',
          returnHint: '\u2014 return to terminal to continue',
          schemes: 'Schemes',
          layout: 'Layout'
        },
        zh: {
          connected: '\u5DF2\u8FDE\u63A5',
          interactionDesign: '\u4EA4\u4E92\u8BBE\u8BA1',
          device: '\u8BBE\u5907',
          specs: '\u4EA4\u4E92\u8BF4\u660E',
          showSpec: '\u67E5\u770B\u4EA4\u4E92\u8BF4\u660E',
          specTitle: '\u4EA4\u4E92\u8BF4\u660E',
          specEmpty: '\u9009\u62E9\u539F\u578B\u67E5\u770B\u4EA4\u4E92\u8BF4\u660E',
          noSpec: '\u6682\u65E0\u4EA4\u4E92\u8BF4\u660E',
          theme: '\u4E3B\u9898',
          lightMode: '\u6D45\u8272\u6A21\u5F0F',
          darkMode: '\u6DF1\u8272\u6A21\u5F0F',
          language: '\u8BED\u8A00',
          status: '\u72B6\u6001',
          statusHint: '\u4E0E\u539F\u578B\u4EA4\u4E92\u540E\uFF0C\u8FD4\u56DE\u7EC8\u7AEF\u7EE7\u7EED',
          indicatorDefault: '\u70B9\u51FB\u4E0A\u65B9\u9009\u9879\uFF0C\u7136\u540E\u8FD4\u56DE\u7EC8\u7AEF',
          selected: '\u5DF2\u9009\u62E9',
          returnHint: '\u2014 \u8FD4\u56DE\u7EC8\u7AEF\u7EE7\u7EED',
          schemes: '\u65B9\u6848',
          layout: '\u5E03\u5C40'
        }
      };

      var currentLang = localStorage.getItem('superpm-lang') || 'en';

      function t(key) { return (i18n[currentLang] && i18n[currentLang][key]) || i18n.en[key] || key; }

      function syncLangUI() {
        // Update all elements with data-i18n attribute
        document.querySelectorAll('[data-i18n]').forEach(function(el) {
          el.textContent = t(el.getAttribute('data-i18n'));
        });
        // Update header lang button
        var headerIcon = document.getElementById('header-lang-icon');
        if (headerIcon) headerIcon.textContent = currentLang === 'en' ? 'EN' : '\u4E2D';
        var sidebarIcon = document.getElementById('lang-icon');
        if (sidebarIcon) sidebarIcon.textContent = currentLang === 'en' ? 'EN' : '\u4E2D';
        var sidebarLabel = document.getElementById('lang-label');
        if (sidebarLabel) sidebarLabel.textContent = currentLang === 'en' ? 'English' : '\u4E2D\u6587';
        // Update theme labels to match language
        var themeLabels = document.querySelectorAll('#theme-label, #header-theme-label');
        var themeLabelText = currentTheme === 'light' ? t('lightMode') : t('darkMode');
        themeLabels.forEach(function(el) { el.textContent = themeLabelText; });
        // Update indicator bar default text
        var indicator = document.getElementById('indicator-text');
        if (indicator && !indicator.querySelector('.selected-text')) {
          indicator.textContent = t('indicatorDefault');
        }
      }

      function toggleLang() {
        currentLang = currentLang === 'en' ? 'zh' : 'en';
        localStorage.setItem('superpm-lang', currentLang);
        syncLangUI();
      }

      // Init header lang button
      syncLangUI();
      var headerLangBtn = document.getElementById('header-lang-btn');
      if (headerLangBtn) headerLangBtn.addEventListener('click', toggleLang);

      // Shared: build sidebar HTML
      function buildSidebar(extraSections) {
        // Group devices by platform
        var groups = { ios: [], aos: [] };
        Object.keys(devices).forEach(function(key) {
          var d = devices[key];
          groups[d.group].push(key);
        });
        var groupLabels = { ios: 'iOS', aos: 'Android' };
        var groupIcons = { ios: '\uD83D\uDCF1', aos: '\uD83E\uDD16' };

        var deviceButtonsHtml = '';
        ['ios', 'aos'].forEach(function(g) {
          deviceButtonsHtml += '<div style="font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.12em;font-weight:600;margin-top:4px">' + groupLabels[g] + '</div>';
          groups[g].forEach(function(key) {
            var d = devices[key];
            var isActive = key === defaultDevice ? ' class="active"' : '';
            deviceButtonsHtml += '<button' + isActive + ' data-dev="' + key + '">' +
              '<span class="device-icon">' + groupIcons[g] + '</span>' +
              '<span class="device-label">' + d.name + '<small>' + d.size + '</small></span>' +
            '</button>';
          });
        });

        return '<div class="device-sidebar">' +
          '<div>' +
            '<h2>Super PM</h2>' +
            '<p style="font-size:12px;color:var(--text-secondary);margin:0" data-i18n="interactionDesign">' + t('interactionDesign') + '</p>' +
          '</div>' +
          '<div class="sidebar-section">' +
            '<div class="sidebar-label" data-i18n="device">' + t('device') + '</div>' +
            '<div class="device-switcher">' + deviceButtonsHtml + '</div>' +
          '</div>' +
          (extraSections || '') +
          '<div class="sidebar-section">' +
            '<div class="sidebar-label" data-i18n="specs">' + t('specs') + '</div>' +
            '<button class="spec-toggle" id="spec-toggle-btn" data-i18n="showSpec">' + t('showSpec') + '</button>' +
          '</div>' +
          '<div class="sidebar-section">' +
            '<div class="sidebar-label" data-i18n="theme">' + t('theme') + '</div>' +
            '<button class="theme-toggle" id="theme-toggle-btn">' +
              '<span class="theme-icon" id="theme-icon">' + (currentTheme === 'light' ? LIGHT_ICON : DARK_ICON) + '</span>' +
              '<span class="theme-label" id="theme-label">' + (currentTheme === 'light' ? t('lightMode') : t('darkMode')) + '</span>' +
            '</button>' +
          '</div>' +
          '<div class="sidebar-section">' +
            '<div class="sidebar-label" data-i18n="language">' + t('language') + '</div>' +
            '<button class="theme-toggle" id="lang-toggle-btn">' +
              '<span id="lang-icon" style="font-weight:700">' + (currentLang === 'en' ? 'EN' : '\u4E2D') + '</span>' +
              '<span id="lang-label">' + (currentLang === 'en' ? 'English' : '\u4E2D\u6587') + '</span>' +
            '</button>' +
          '</div>' +
          '<div class="sidebar-section">' +
            '<div class="sidebar-label" data-i18n="status">' + t('status') + '</div>' +
            '<div class="sidebar-hint" id="sidebar-indicator" data-i18n="statusHint">' + t('statusHint') + '</div>' +
          '</div>' +
        '</div>';
      }

      // Shared: build right spec sidebar
      function buildSpecSidebar(specHtml) {
        return '<div class="spec-sidebar" id="spec-sidebar" style="display:none">' +
          '<div class="spec-resize-handle" id="spec-resize"></div>' +
          '<div class="spec-sidebar-header">' +
            '<span data-i18n="specTitle">' + t('specTitle') + '</span>' +
            '<button class="close-btn" id="spec-close">\u00D7</button>' +
          '</div>' +
          '<div class="spec-sidebar-body" id="spec-body">' +
            (specHtml || '<div class="spec-sidebar-empty" data-i18n="specEmpty">' + t('specEmpty') + '</div>') +
          '</div>' +
        '</div>';
      }

      // Shared: extract spec HTML from a trigger element's [data-interaction-spec] child
      function extractSpec(el) {
        var specEl = el ? el.querySelector('[data-interaction-spec]') : null;
        return specEl ? specEl.innerHTML : '';
      }

      // Shared: bind spec sidebar resize handle
      function bindSpecResize() {
        var handle = document.getElementById('spec-resize');
        var sidebar = document.getElementById('spec-sidebar');
        if (!handle || !sidebar) return;
        var startX, startW;
        handle.addEventListener('mousedown', function(e) {
          e.preventDefault();
          startX = e.clientX;
          startW = sidebar.offsetWidth;
          handle.classList.add('dragging');
          document.body.style.cursor = 'col-resize';
          document.body.style.userSelect = 'none';
          function onMove(e) {
            var w = startW - (e.clientX - startX);
            if (w >= 280 && w <= 700) sidebar.style.width = w + 'px';
          }
          function onUp() {
            handle.classList.remove('dragging');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
          }
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      }

      // Shared: bind sidebar theme toggle button + sync UI
      function bindThemeToggle() {
        var btn = document.getElementById('theme-toggle-btn');
        if (btn) btn.addEventListener('click', toggleTheme);
        syncThemeUI();
      }

      // Shared: bind sidebar lang toggle button + sync UI
      function bindLangToggle() {
        var btn = document.getElementById('lang-toggle-btn');
        if (btn) btn.addEventListener('click', toggleLang);
        syncLangUI();
      }

      // Shared: bind spec sidebar toggle and close
      function bindSpecSidebar() {
        var sidebar = document.getElementById('spec-sidebar');
        var closeBtn = document.getElementById('spec-close');
        var toggleBtn = document.getElementById('spec-toggle-btn');
        if (closeBtn && sidebar) {
          closeBtn.addEventListener('click', function() {
            sidebar.style.display = 'none';
            if (toggleBtn) toggleBtn.classList.remove('active');
            drawConnectors();
          });
        }
        if (toggleBtn && sidebar) {
          toggleBtn.addEventListener('click', function() {
            var visible = sidebar.style.display !== 'none';
            sidebar.style.display = visible ? 'none' : 'flex';
            toggleBtn.classList.toggle('active', !visible);
            setTimeout(drawConnectors, 50);
          });
        }
        // Update connectors on scroll, resize, and card collapse/expand
        if (sidebar) {
          sidebar.addEventListener('scroll', drawConnectors);
          sidebar.addEventListener('click', function(e) {
            if (e.target.closest('.spec-card-header')) setTimeout(drawConnectors, 50);
          });
        }
        window.addEventListener('resize', drawConnectors);
      }

      // Shared: update spec sidebar content
      // Convert raw spec HTML into cards (split by h3 headings)
      function specToCards(html) {
        if (!html) return '<div class="spec-sidebar-empty">No interaction spec available</div>';
        // Parse into a temp container
        var tmp = document.createElement('div');
        tmp.innerHTML = html;
        var children = Array.prototype.slice.call(tmp.childNodes);
        var cards = [];
        var currentTitle = '';
        var currentBody = '';

        function flush() {
          if (currentTitle || currentBody.trim()) {
            cards.push(
              '<div class="spec-card">' +
                '<div class="spec-card-header" onclick="this.parentElement.classList.toggle(\'collapsed\')">' +
                  '<span>' + (currentTitle || 'Overview') + '</span>' +
                  '<span class="toggle-icon"></span>' +
                '</div>' +
                '<div class="spec-card-body">' + currentBody + '</div>' +
              '</div>'
            );
          }
          currentTitle = '';
          currentBody = '';
        }

        children.forEach(function(node) {
          if (node.nodeType === 1 && node.tagName === 'H3') {
            flush();
            currentTitle = node.textContent;
          } else {
            if (node.nodeType === 1) currentBody += node.outerHTML;
            else if (node.nodeType === 3 && node.textContent.trim()) currentBody += node.textContent;
          }
        });
        flush();

        return cards.length > 0 ? cards.join('') : '<div class="spec-sidebar-empty">No interaction spec available</div>';
      }

      function showSpec(html) {
        var sidebar = document.getElementById('spec-sidebar');
        var body = document.getElementById('spec-body');
        var toggleBtn = document.getElementById('spec-toggle-btn');
        if (body) body.innerHTML = specToCards(html);
        if (sidebar) sidebar.style.display = 'flex';
        if (toggleBtn) toggleBtn.classList.add('active');
        setTimeout(drawConnectors, 50);
      }

      // Connector lines: draw bezier curves from spec cards to phone shell
      function drawConnectors() {
        var existing = document.getElementById('connector-svg');
        if (existing) existing.remove();

        var shell = document.querySelector('[data-role="shell"]');
        var specBody = document.getElementById('spec-body');
        var specSidebar = document.getElementById('spec-sidebar');
        if (!shell || !specBody || !specSidebar || specSidebar.style.display === 'none') return;

        var cards = specBody.querySelectorAll('.spec-card:not(.collapsed)');
        if (cards.length === 0) return;

        var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('class', 'connector-svg');
        svg.setAttribute('id', 'connector-svg');
        document.body.appendChild(svg);

        var shellRect = shell.getBoundingClientRect();
        var shellRight = shellRect.right;
        var shellCenterY = shellRect.top + shellRect.height / 2;

        cards.forEach(function(card) {
          var cardRect = card.getBoundingClientRect();
          var startX = cardRect.left;
          var startY = cardRect.top + cardRect.height / 2;
          var endX = shellRight + 12;
          var endY = Math.min(Math.max(startY, shellRect.top + 40), shellRect.bottom - 40);
          var cpOffset = Math.abs(startX - endX) * 0.4;

          var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('class', 'connector-line');
          path.setAttribute('d',
            'M' + startX + ',' + startY +
            ' C' + (startX - cpOffset) + ',' + startY +
            ' ' + (endX + cpOffset) + ',' + endY +
            ' ' + endX + ',' + endY
          );
          svg.appendChild(path);

          var dotStart = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          dotStart.setAttribute('class', 'connector-dot');
          dotStart.setAttribute('cx', startX);
          dotStart.setAttribute('cy', startY);
          dotStart.setAttribute('r', '3');
          svg.appendChild(dotStart);

          var dotEnd = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          dotEnd.setAttribute('class', 'connector-dot');
          dotEnd.setAttribute('cx', endX);
          dotEnd.setAttribute('cy', endY);
          dotEnd.setAttribute('r', '3');
          svg.appendChild(dotEnd);
        });
      }

      // Shared: build a device shell HTML string (for wrapping content or iframe)
      function buildShell(innerContent) {
        var cfg = devices[defaultDevice];
        var shellClass = cfg.group === 'ios' ? 'device-shell-ios' : 'device-shell-aos';
        return '<div class="device-shell ' + shellClass + '" data-role="shell" style="width:' + cfg.w + 'px">' +
          '<div class="device-dynamic-island" data-role="island"' + (cfg.showIsland ? '' : ' style="display:none"') + '></div>' +
          '<div class="' + cfg.statusClass + '" data-role="statusbar">' + cfg.statusHtml + '</div>' +
          '<div class="device-content" data-role="screen" style="height:' + cfg.h + 'px">' + innerContent + '</div>' +
          '<div data-role="bottom">' + cfg.bottomHtml + '</div>' +
        '</div>';
      }

      // Shared: bind device switcher to update all shells on the page
      function bindDeviceSwitcher() {
        var buttons = document.querySelectorAll('.device-switcher button[data-dev]');
        buttons.forEach(function(btn) {
          btn.addEventListener('click', function() {
            var dev = btn.getAttribute('data-dev');
            var cfg = devices[dev];
            if (!cfg) return;
            buttons.forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            var shellClass = cfg.group === 'ios' ? 'device-shell-ios' : 'device-shell-aos';
            // Update ALL shells on the page
            document.querySelectorAll('[data-role="shell"]').forEach(function(shell) {
              shell.className = 'device-shell ' + shellClass;
              shell.style.width = cfg.w + 'px';
            });
            document.querySelectorAll('[data-role="island"]').forEach(function(el) {
              el.style.display = cfg.showIsland ? 'block' : 'none';
            });
            document.querySelectorAll('[data-role="statusbar"]').forEach(function(el) {
              el.className = cfg.statusClass;
              el.innerHTML = cfg.statusHtml;
            });
            document.querySelectorAll('[data-role="screen"]').forEach(function(el) {
              el.className = 'device-content';
              el.style.height = cfg.h + 'px';
            });
            document.querySelectorAll('[data-role="bottom"]').forEach(function(el) {
              el.innerHTML = cfg.bottomHtml;
            });
          });
        });
      }

      // ===== MODE: data-device-canvas (multi-prototype iframe grid) =====
      var canvasTrigger = content.querySelector('[data-device-canvas]');
      if (canvasTrigger) {
        enterFullscreen();

        // Parse scheme list from data attributes
        // Expected: <div data-device-canvas data-schemes='[{"file":"scheme-a.html","title":"方案 A","color":"#FF6B35"},...]'>
        var schemes = [];
        try { schemes = JSON.parse(canvasTrigger.getAttribute('data-schemes') || '[]'); } catch(e) {}

        if (schemes.length === 0) return;

        // Determine default layout
        var defaultLayout = schemes.length >= 3 ? 3 : schemes.length;

        // Build scheme list for sidebar
        var schemeListHtml = '<div class="sidebar-section">' +
          '<div class="sidebar-label">Schemes (' + schemes.length + ')</div>' +
          '<div class="scheme-list">';
        schemes.forEach(function(s, i) {
          var color = s.color || ['#FF6B35','#2563EB','#059669','#8B5CF6','#EC4899'][i % 5];
          schemeListHtml += '<div class="scheme-list-item">' +
            '<div class="dot" style="background:' + color + '"></div>' +
            (s.title || ('Scheme ' + String.fromCharCode(65 + i))) +
          '</div>';
        });
        schemeListHtml += '</div></div>';

        // Build layout switcher for sidebar
        var layoutHtml = '<div class="sidebar-section">' +
          '<div class="sidebar-label">Layout</div>' +
          '<div class="layout-switcher">';
        [1, 2, 3].forEach(function(n) {
          layoutHtml += '<button data-layout="' + n + '"' + (n === defaultLayout ? ' class="active"' : '') + '>' + n + (n === 1 ? ' col' : ' cols') + '</button>';
        });
        layoutHtml += '</div></div>';

        // Collect specs from data-spec-for elements inside canvasTrigger
        var specMap = {};
        canvasTrigger.querySelectorAll('[data-spec-for]').forEach(function(el) {
          specMap[el.getAttribute('data-spec-for')] = el.innerHTML;
        });

        // Build canvas with iframe shells
        var canvasHtml = '<div class="canvas-grid layout-' + defaultLayout + '" id="canvas-grid">';
        schemes.forEach(function(s, i) {
          var color = s.color || ['#FF6B35','#2563EB','#059669','#8B5CF6','#EC4899'][i % 5];
          var title = s.title || ('Scheme ' + String.fromCharCode(65 + i));
          var iframeHtml = '<iframe src="/files/' + s.file + '" style="width:100%;height:100%"></iframe>';
          canvasHtml += '<div class="canvas-item" data-scheme-file="' + s.file + '">' +
            '<div class="canvas-item-title" style="border-left:3px solid ' + color + ';cursor:pointer" data-scheme-click="' + s.file + '">' + title + '</div>' +
            buildShell(iframeHtml) +
          '</div>';
        });
        canvasHtml += '</div>';

        // Make scheme list items clickable
        schemeListHtml = schemeListHtml.replace(/scheme-list-item/g, 'scheme-list-item clickable');

        content.innerHTML =
          '<div class="device-frame-layout">' +
            buildSidebar(schemeListHtml + layoutHtml) +
            canvasHtml +
            buildSpecSidebar() +
          '</div>';

        bindDeviceSwitcher();
        bindThemeToggle();
        bindLangToggle();
        bindSpecSidebar();
        bindSpecResize();

        // Click scheme title or sidebar list → show spec in right sidebar
        function selectScheme(file) {
          // Highlight canvas title
          document.querySelectorAll('.canvas-item-title').forEach(function(el) { el.classList.remove('selected'); });
          var clicked = document.querySelector('[data-scheme-click="' + file + '"]');
          if (clicked) clicked.classList.add('selected');
          // Highlight sidebar list
          document.querySelectorAll('.scheme-list-item').forEach(function(el) { el.classList.remove('active'); });
          // Show spec
          var html = specMap[file];
          if (html) {
            showSpec(html);
          } else {
            showSpec('<div class="spec-sidebar-empty">This scheme has no interaction spec</div>');
          }
        }

        document.querySelectorAll('[data-scheme-click]').forEach(function(el) {
          el.addEventListener('click', function() {
            selectScheme(el.getAttribute('data-scheme-click'));
          });
        });

        // Also make sidebar scheme list clickable
        var listItems = document.querySelectorAll('.scheme-list-item.clickable');
        listItems.forEach(function(el, i) {
          if (schemes[i]) {
            el.addEventListener('click', function() {
              selectScheme(schemes[i].file);
              listItems.forEach(function(li) { li.classList.remove('active'); });
              el.classList.add('active');
            });
          }
        });

        // Layout switcher logic
        var layoutBtns = document.querySelectorAll('.layout-switcher button');
        var grid = document.getElementById('canvas-grid');
        layoutBtns.forEach(function(btn) {
          btn.addEventListener('click', function() {
            layoutBtns.forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            grid.className = 'canvas-grid layout-' + btn.getAttribute('data-layout');
          });
        });

        return; // canvas mode handled, skip single-frame check
      }

      // ===== MODE: data-device-frame (single prototype) =====
      var trigger = content.querySelector('[data-device-frame]');
      if (!trigger) return;

      // Single prototype mode: extract content and spec, wrap in shell
      var specHtml = extractSpec(trigger);
      var innerHtml = trigger.innerHTML;
      // Remove the spec div from innerHtml so it doesn't render in the prototype
      var tempDiv = document.createElement('div');
      tempDiv.innerHTML = innerHtml;
      var specInner = tempDiv.querySelector('[data-interaction-spec]');
      if (specInner) specInner.parentNode.removeChild(specInner);
      innerHtml = tempDiv.innerHTML;

      enterFullscreen();

      content.innerHTML =
        '<div class="device-frame-layout">' +
          buildSidebar() +
          '<div class="device-main">' +
            buildShell(innerHtml) +
          '</div>' +
          buildSpecSidebar(specHtml) +
        '</div>';

      bindDeviceSwitcher();
      bindThemeToggle();
      bindLangToggle();
      bindSpecSidebar();
      bindSpecResize();
      // Auto-show spec if available
      if (specHtml) showSpec(specHtml);
    });
  </script>

</body>
</html>
